<!DOCTYPE html>
<html>
<head>
    <title>CKD Assessment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>CKD Assessment Form</h2>

<form action="/ckd-result" method="POST">
    <div class="mb-3">
        <label>eGFR Value</label>
        <input type="number" step="0.1" name="egfr" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Check Result</button>
</form>

</body>
</html>
